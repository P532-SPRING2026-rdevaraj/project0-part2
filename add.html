<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Duck</title>
</head>
<body>

<h2>Add a Duck</h2>

<label>Id:</label>
<input id="duckId" type="number">
<br><br>

<label>Type:</label>
<input id="duckType" type="text">
<br><br>

<label>Image:</label>
<input id="duckImage" type="file">
<br><br>

<button onclick="addTheDuck()">Add the duck</button>

<script>

    function addTheDuck() {

        let duckId = document.getElementById("duckId").value;
        let duckType = document.getElementById("duckType").value;

        let duck = {
            id: duckId,
            type: duckType
        };

        fetch("https://ducksservice-rohith.onrender.com/ducks", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(duck)
        })
        .then(response => response.json())
        .then(data => {
            submitTheImage(data.id);
        })
        .catch(error => {
            console.error("Error:", error);
            alert("Error saving duck!");
        });
    }

    function submitTheImage(duckId) {

        let imageInput = document.getElementById("duckImage");
        let file = imageInput.files[0];

        let formData = new FormData();
        formData.append("file", file);

        fetch("https://ducksservice-rohith.onrender.com/ducks/" + duckId + "/image", {
            method: "POST",
            body: formData
        })
        .then(response => {
            alert("Duck and image added successfully!");
        })
        .catch(error => {
            console.error("Error:", error);
            alert("Error uploading image!");
        });
    }

</script>

</body>
</html>
