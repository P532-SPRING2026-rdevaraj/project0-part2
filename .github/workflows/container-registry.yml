name: Docker Image CI for GHCR

on:
  push

permissions:
  contents: read
  packages: write

jobs:
  build_and_publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v1

      - name: Set up JDK 1.17
        uses: actions/setup-java@v2
        with:
          java-version: '17'
          distribution: 'adopt'

      - name: Build the package
        run: mvn --batch-mode -DskipTests package
        working-directory: ducks-service

      - name: Run the unit tests
        run: mvn --batch-mode -Dmaven.test.failure.ignore=true test
        working-directory: ducks-service

      - name: Build and push the image
        run: |
          docker login --username RohithGowdaD --password ${{secrets.ACCESS_TOKEN}} ghcr.io
          docker build -t ghcr.io/YOUR_USERNAME/ducks-service:latest --file ducks-service/Dockerfile ducks-service  
          docker push ghcr.io/RohithGowdaD/ducks-service:latest 
